<!DOCTYPE html>
<html>
<head>
  <title>User Finder</title>

  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f2f4f7;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #222;
    }

    #searchBox {
      width: 300px;
      display: block;
      margin: 10px auto 30px auto;
      padding: 12px 15px;
      border: 2px solid #4a90e2;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
    }

    #searchBox:focus {
      box-shadow: 0 0 10px rgba(0, 125, 255, 0.4);
    }

    .user-card {
      background: white;
      width: 300px;
      margin: 10px auto;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
      display: none;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }

    .email {
      color: #555;
      margin: 4px 0;
    }

    .city {
      font-size: 14px;
      color: #777;
    }

    #loading {
      text-align: center;
      display: none;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>🔍 User Finder with jQuery + AJAX</h1>

  <input type="text" id="searchBox" placeholder="Search by name...">

  <div id="userList"></div>

  <div id="loading">⏳ Loading users...</div>

  <script src="app.js"></script>
</body>
</html>
